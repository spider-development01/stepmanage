<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step & Style Manager - Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            /* Neobrutalism Palette */
            --bg: #F4F0EA;
            --text-main: #0F0F0F;
            --border-color: #0F0F0F;
            
            --primary: #FF3366;    /* Vibrant Pink */
            --primary-hover: #E62E5C;
            --secondary: #00E5FF;  /* Cyan */
            --warning: #FFD600;    /* Yellow */
            --success: #00E676;    /* Green */
            
            --border-width: 3px;
            --shadow-offset: 6px;
            --border-radius: 4px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Space Grotesk', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle, #0F0F0F 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- Neobrutalism Mixins --- */
        .brutal-box { 
            background: #FFFFFF; 
            border: var(--border-width) solid var(--border-color); 
            border-radius: var(--border-radius); 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color); 
            transition: all 0.2s ease; 
        }
        
        .brutal-btn { 
            background: #FFFFFF; 
            border: var(--border-width) solid var(--border-color); 
            padding: 14px 28px; 
            border-radius: var(--border-radius); 
            color: var(--text-main); 
            font-size: 16px; 
            font-weight: 700; 
            text-transform: uppercase;
            cursor: pointer; 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color); 
            transition: all 0.15s ease-in-out; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            outline: none; 
        }
        
        .brutal-btn:hover { 
            transform: translate(-2px, -2px);
            box-shadow: calc(var(--shadow-offset) + 2px) calc(var(--shadow-offset) + 2px) 0px var(--border-color);
        }
        
        .brutal-btn:active { 
            transform: translate(var(--shadow-offset), var(--shadow-offset)); 
            box-shadow: 0px 0px 0px var(--border-color); 
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: var(--secondary); color: var(--text-main); }
        .btn-warning { background: var(--warning); color: var(--text-main); }
        .btn-danger { background: var(--text-main); color: #fff; }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .input-group label { font-size: 14px; font-weight: 700; color: var(--text-main); text-transform: uppercase; }
        
        .brutal-input { 
            width: 100%; 
            background: #FFFFFF; 
            border: var(--border-width) solid var(--border-color); 
            padding: 12px 16px; 
            border-radius: var(--border-radius); 
            outline: none; 
            color: var(--text-main); 
            font-weight: 600; 
            font-size: 15px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            transition: all 0.2s ease; 
        }
        .brutal-input:focus { 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color); 
            transform: translate(-2px, -2px);
            background: #FFFCE0;
        }

        /* --- Layout --- */
        header { 
            width: 90%; 
            max-width: 1000px; 
            padding: 24px; 
            text-align: center; 
            margin-top: 30px; 
            margin-bottom: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            background: var(--warning);
        }
        header h1 { font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px;}
        header i { font-size: 36px; }
        
        .container { width: 90%; max-width: 1000px; padding-bottom: 80px; }
        .view-section { display: none; animation: slideUp 0.3s ease-out; }
        .view-section.active { display: block; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Home View --- */
        .home-menu { display: flex; flex-direction: column; gap: 25px; align-items: center; margin-top: 40px; }
        .home-btn { width: 100%; max-width: 320px; height: 80px; font-size: 18px; }
        .home-btn i { font-size: 28px; }

        /* --- Capture View --- */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        
        .mode-selector { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px; 
            background: #fff;
            gap: 10px; 
            margin-bottom: 24px; 
        }
        
        .mode-label { 
            flex: 1;
            text-align: center;
            cursor: pointer; 
            padding: 12px 10px; 
            font-weight: 700; 
            font-size: 14px; 
            border: 2px solid transparent;
            border-radius: var(--border-radius); 
            transition: all 0.2s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px; 
            text-transform: uppercase;
        }
        .mode-label input { display: none; }
        .mode-label.active { 
            border-color: var(--border-color); 
            background: var(--secondary); 
            box-shadow: 3px 3px 0px var(--border-color);
        }

        /* Camera Viewfinder */
        .camera-wrapper { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .camera-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 3/4; 
            border: var(--border-width) solid var(--border-color);
            background: #000; 
            border-radius: var(--border-radius);
            overflow: hidden;
        }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; display: block; }
        .camera-grid { 
            position: absolute; inset: 0; pointer-events: none; 
            background-image: linear-gradient(to right, transparent calc(33.33% - 1px), rgba(255,255,255,0.7) 33.33%, transparent calc(33.33% + 1px), transparent calc(66.66% - 1px), rgba(255,255,255,0.7) 66.66%, transparent calc(66.66% + 1px)), 
                              linear-gradient(to bottom, transparent calc(33.33% - 1px), rgba(255,255,255,0.7) 33.33%, transparent calc(33.33% + 1px), transparent calc(66.66% - 1px), rgba(255,255,255,0.7) 66.66%, transparent calc(66.66% + 1px)); 
        }
        
        .filmstrip { 
            display: none; gap: 12px; padding: 14px; 
            overflow-x: auto; background: #fff; 
            border: var(--border-width) solid var(--border-color);
        }
        .filmstrip.active { display: flex; animation: slideUp 0.3s ease; }
        .thumb-wrapper { position: relative; flex-shrink: 0; }
        .thumb-wrapper img { height: 80px; width: 60px; object-fit: cover; border: 2px solid #000; }
        .thumb-wrapper .del-thumb { 
            position: absolute; top: -10px; right: -10px; 
            background: var(--primary); color: white; border: 2px solid #000; 
            width: 24px; height: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 2px 2px 0 #000;
        }

        .camera-controls { 
            width: 100%; display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 20px; background: #fff; border: var(--border-width) solid var(--border-color);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--border-color);
        }
        
        .icon-btn { 
            width: 50px; height: 50px; background: var(--warning); 
            border: var(--border-width) solid var(--border-color); 
            color: var(--text-main); font-size: 24px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 4px 4px 0px var(--border-color); transition: all 0.1s; 
        }
        .icon-btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 #000; }

        .shutter-btn { 
            width: 70px; height: 70px; border-radius: 50%; 
            border: 4px solid var(--border-color); background: var(--primary); 
            cursor: pointer; box-shadow: 5px 5px 0px var(--border-color); 
            transition: all 0.1s; outline: none;
        }
        .shutter-btn:active { transform: translate(5px, 5px); box-shadow: 0 0 0 #000; background: var(--primary-hover); }
        
        .upload-batch-btn { display: none; width: 100%; }
        .upload-batch-btn.active { display: flex; animation: slideUp 0.3s ease; }

        /* --- Inventory View --- */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .inventory-card { padding: 24px; display: flex; flex-direction: column; background: #FFF; }
        
        .carousel-container { 
            position: relative; width: 100%; padding-top: 100%; 
            border: var(--border-width) solid var(--border-color); 
            overflow: hidden; margin-bottom: 20px; background: #000;
        }
        .carousel-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .carousel-nav { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: #fff; border: 2px solid #000; width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 4px 4px 0px #000; z-index: 2; font-size: 20px;
        }
        .carousel-nav:active { box-shadow: 0 0 0 #000; margin-top: 4px; margin-left: 4px; }
        .nav-left { left: 10px; }
        .nav-right { right: 10px; }
        .carousel-badge { 
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); 
            background: var(--warning); color: #000; padding: 6px 14px; 
            border: 2px solid #000; font-size: 14px; font-weight: 800; z-index: 2; box-shadow: 3px 3px 0 #000;
        }

        .inventory-actions { display: flex; gap: 12px; margin-top: 10px; }
        .empty-state { 
            grid-column: 1 / -1; text-align: center; padding: 60px 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
        }
        .empty-state i { font-size: 64px; color: var(--text-main); }

        /* --- Global Components --- */
        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150px); 
            padding: 16px 28px; background: var(--success); color: #000; border: 3px solid #000;
            font-weight: 800; font-size: 16px; opacity: 0; 
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.3s; 
            z-index: 9999; display: flex; align-items: center; gap: 12px; box-shadow: 6px 6px 0px #000; 
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.danger-toast { background: var(--primary); color: #fff; }
        .toast.sync-toast { background: var(--secondary); }

        .loader-overlay { 
            position: fixed; inset: 0; background: rgba(244, 240, 234, 0.9); 
            z-index: 10000; display: none; flex-direction: column; align-items: center; 
            justify-content: center; color: var(--text-main); font-weight: 800; gap: 20px; font-size: 20px; text-transform: uppercase;
        }
        .spinner { 
            width: 60px; height: 60px; border: 6px solid #000; 
            border-top: 6px solid var(--primary); border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        select.brutal-input { appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>'); background-repeat: no-repeat; background-position: right 16px center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <span id="loader-text">Processing...</span>
    </div>

    <header class="brutal-box">
        <i class="ph-bold ph-sneaker"></i>
        <h1>Step & Style</h1>
    </header>

    <div class="container">
        <!-- HOME VIEW -->
        <section id="view-home" class="view-section active">
            <div class="home-menu">
                <button class="brutal-btn home-btn btn-primary" onclick="navTo('capture')">
                    <i class="ph-bold ph-camera"></i> Capture Studio
                </button>
                <button class="brutal-btn home-btn btn-secondary" onclick="navTo('inventory')">
                    <i class="ph-bold ph-kanban"></i> Manage Data
                </button>
            </div>
        </section>

        <!-- CAPTURE VIEW -->
        <section id="view-capture" class="view-section">
            <div class="nav-bar">
                <button class="brutal-btn" onclick="navTo('home')">
                    <i class="ph-bold ph-arrow-left"></i> Back
                </button>
                <div style="font-size:16px; font-weight:800; text-transform:uppercase;">Capture Mode</div>
            </div>
            
            <div class="mode-selector brutal-box">
                <label class="mode-label active" id="label-single">
                    <input type="radio" name="captureMode" value="single" checked onchange="updateModeUI()"> 
                    <i class="ph-bold ph-image"></i> Single
                </label>
                <label class="mode-label" id="label-multi">
                    <input type="radio" name="captureMode" value="multiple" onchange="updateModeUI()"> 
                    <i class="ph-bold ph-images"></i> Batch
                </label>
            </div>

            <div class="camera-wrapper brutal-box">
                <div class="camera-container">
                    <video id="camera-feed" autoplay playsinline></video>
                    <div class="camera-grid"></div>
                </div>
                
                <div id="filmstrip" class="filmstrip"></div>

                <div class="camera-controls">
                    <button class="icon-btn" onclick="switchCamera()" title="Flip Camera">
                        <i class="ph-bold ph-arrows-clockwise"></i>
                    </button>
                    <button class="shutter-btn" onclick="takePhoto()" title="Capture"></button>
                    <div style="width: 50px;"></div>
                </div>

                <button id="upload-batch-btn" class="brutal-btn btn-primary upload-batch-btn" onclick="saveProductBatch()">
                    <i class="ph-bold ph-upload-simple"></i>Save Batch (<span id="batch-count">0</span>)
                </button>
            </div>
        </section>

        <!-- INVENTORY VIEW -->
        <section id="view-inventory" class="view-section">
            <div class="nav-bar">
                <button class="brutal-btn" onclick="navTo('home')">
                    <i class="ph-bold ph-arrow-left"></i> Back
                </button>
                <button class="brutal-btn btn-warning" onclick="exportCSV()">
                    <i class="ph-bold ph-download-simple"></i> Download CSV
                </button>
            </div>
            <div id="inventory-list" class="inventory-grid"></div>
        </section>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <div id="toast" class="toast">
        <i class="ph-bold ph-check-circle"></i>
        <span id="toast-msg">Success!</span>
    </div>

    <script>
        // ==========================================
        // 1. SUPABASE CREDENTIALS
        // ==========================================
        const SUPABASE_URL = 'http://127.0.0.1:3000/orders.html?serverWindowId=c27d067e-fce9-483c-a7df-8a8fc9d2d2a1'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZmN5b2Jqdmp0ZHRyYWR2eXRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDczOTIsImV4cCI6MjA5MDc4MzM5Mn0.bflKpxSxejFXVlesIfl6zb-SOr6mqhZtkopJJEbhuYU';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentStream = null;
        let facingMode = 'environment';
        let inventoryData = [];
        let currentBatch = []; 
        let isInventoryLoaded = false;

        // ==========================================
        // INITIALIZE REALTIME SYNC
        // ==========================================
        supabaseClient
            .channel('public:inventory_items')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'inventory_items' }, payload => {
                handleRealtimeInsert(payload.new);
            })
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'inventory_items' }, payload => {
                handleRealtimeUpdate(payload.new);
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'inventory_items' }, payload => {
                handleRealtimeDelete(payload.old);
            })
            .subscribe();

        // ==========================================
        // UI HELPERS
        // ==========================================
        function navTo(view) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            if(view === 'capture') startCamera(); else stopCamera();
            if(view === 'inventory') loadInventory();
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            document.getElementById('toast-msg').innerText = message;
            
            toast.className = 'toast show'; 
            if(type === 'danger') { toast.classList.add('danger-toast'); icon.className = 'ph-bold ph-trash'; } 
            else if(type === 'sync') { toast.classList.add('sync-toast'); icon.className = 'ph-bold ph-arrows-clockwise'; }
            else { icon.className = 'ph-bold ph-check-circle'; }
            
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleLoader(show, text = "Processing...") {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        function updateModeUI() {
            const isSingle = document.querySelector('input[value="single"]').checked;
            document.getElementById('label-single').classList.toggle('active', isSingle);
            document.getElementById('label-multi').classList.toggle('active', !isSingle);
            if(isSingle && currentBatch.length > 0) { currentBatch = []; renderFilmstrip(); }
        }

        // ==========================================
        // CAMERA LOGIC
        // ==========================================
        async function startCamera() {
            if (currentStream) stopCamera();
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } } });
                document.getElementById('camera-feed').srcObject = currentStream;
            } catch (err) { alert("Camera access denied."); }
        }

        function stopCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
        }

        function switchCamera() { facingMode = facingMode === 'environment' ? 'user' : 'environment'; startCamera(); }

        function takePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('canvas');
            const mode = document.querySelector('input[name="captureMode"]:checked').value;
            
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                if (mode === 'single') {
                    uploadSingleImage(blob);
                } else {
                    currentBatch.push({ blob, url });
                    renderFilmstrip();
                }
            }, 'image/jpeg', 0.85);
        }

        function renderFilmstrip() {
            const filmstrip = document.getElementById('filmstrip');
            const uploadBtn = document.getElementById('upload-batch-btn');
            
            if (currentBatch.length > 0) {
                filmstrip.classList.add('active'); uploadBtn.classList.add('active');
                document.getElementById('batch-count').innerText = currentBatch.length;
            } else {
                filmstrip.classList.remove('active'); uploadBtn.classList.remove('active');
            }

            filmstrip.innerHTML = '';
            currentBatch.forEach((item, index) => {
                filmstrip.innerHTML += `
                    <div class="thumb-wrapper">
                        <img src="${item.url}" alt="thumb">
                        <button class="del-thumb" onclick="removePhoto(${index})"><i class="ph-bold ph-x"></i></button>
                    </div>`;
            });
        }

        function removePhoto(index) { currentBatch.splice(index, 1); renderFilmstrip(); }

        // ==========================================
        // UPLOAD LOGIC
        // ==========================================
        async function uploadSingleImage(blob) {
            toggleLoader(true, "Uploading Photo...");
            try {
                const fileName = `product_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
                const { error: uploadError } = await supabaseClient.storage.from('images').upload(fileName, blob, { contentType: 'image/jpeg' });
                if (uploadError) throw new Error("Storage Upload Failed: " + uploadError.message);
                
                const { data } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                const { error: dbError } = await supabaseClient.from('inventory_items').insert([{ image_url: data.publicUrl, images: [data.publicUrl] }]);
                if (dbError) throw new Error("Database Insert Failed: " + dbError.message);

                showToast("Product saved!");
            } catch (err) { alert("ERROR: " + err.message); } finally { toggleLoader(false); }
        }

        async function saveProductBatch() {
            if(currentBatch.length === 0) return;
            const batchToUpload = [...currentBatch];
            currentBatch = []; renderFilmstrip();
            toggleLoader(true, `Uploading Batch (${batchToUpload.length})...`);

            try {
                const uploadPromises = batchToUpload.map(async (item) => {
                    const fileName = `product_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
                    const { error } = await supabaseClient.storage.from('images').upload(fileName, item.blob, { contentType: 'image/jpeg' });
                    if (error) throw new Error("Storage Upload Failed: " + error.message);
                    const { data } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                    return data.publicUrl;
                });

                const uploadedUrls = await Promise.all(uploadPromises);
                const { error: dbError } = await supabaseClient.from('inventory_items').insert([{ image_url: uploadedUrls[0], images: uploadedUrls }]);
                if (dbError) throw new Error("Database Insert Failed: " + dbError.message);

                showToast("Batch saved successfully!");
            } catch (err) {
                alert("ERROR: " + err.message);
                currentBatch = [...batchToUpload, ...currentBatch]; renderFilmstrip();
            } finally { toggleLoader(false); }
        }

        // ==========================================
        // INVENTORY GENERATOR
        // ==========================================
        function createCardHTML(item) {
            let imagesArray = item.images || [];
            if (imagesArray.length === 0 && item.image_url) imagesArray = [item.image_url];
            if (imagesArray.length === 0) imagesArray = ["https://via.placeholder.com/400x400?text=NO+IMAGE"];

            const hasMultiple = imagesArray.length > 1;
            const imagesJson = JSON.stringify(imagesArray).replace(/"/g, '&quot;');

            return `
                <div class="carousel-container" id="carousel-${item.id}" data-images="${imagesJson}" data-idx="0">
                    <img src="${imagesArray[0]}" class="carousel-img" id="img-${item.id}" loading="lazy">
                    ${hasMultiple ? `
                        <button class="carousel-nav nav-left" onclick="slideImg('${item.id}', -1)"><i class="ph-bold ph-caret-left"></i></button>
                        <button class="carousel-nav nav-right" onclick="slideImg('${item.id}', 1)"><i class="ph-bold ph-caret-right"></i></button>
                        <div class="carousel-badge" id="badge-${item.id}">1 / ${imagesArray.length}</div>
                    ` : ''}
                </div>
                
                <div class="input-group">
                    <label>Model No.</label>
                    <input type="text" class="brutal-input" id="model-${item.id}" value="${item.model_no || ''}" placeholder="e.g. NK-2023">
                </div>
                <div class="input-group">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" class="brutal-input" id="price-${item.id}" value="${item.price || ''}" placeholder="e.g. 129.99">
                </div>
                <div class="input-group">
                    <label>Gender Category</label>
                    <select class="brutal-input" id="gender-${item.id}">
                        <option value="" ${!item.gender_category ? 'selected' : ''}>Select Category</option>
                        <option value="Men" ${item.gender_category === 'Men' ? 'selected' : ''}>Men</option>
                        <option value="Women" ${item.gender_category === 'Women' ? 'selected' : ''}>Women</option>
                        <option value="Unisex" ${item.gender_category === 'Unisex' ? 'selected' : ''}>Unisex</option>
                        <option value="Kids" ${item.gender_category === 'Kids' ? 'selected' : ''}>Kids</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Sizes Available</label>
                    <input type="text" class="brutal-input" id="size-${item.id}" value="${item.sizes_available || ''}" placeholder="e.g. 8, 9, 10, 11">
                </div>
                <div class="input-group">
                    <label>Color</label>
                    <input type="text" class="brutal-input" id="color-${item.id}" value="${item.color || ''}" placeholder="e.g. Red/Black">
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Style</label>
                    <input type="text" class="brutal-input" id="style-${item.id}" value="${item.style || ''}" placeholder="e.g. High-Top, Running">
                </div>

                <div class="inventory-actions">
                    <button class="brutal-btn btn-primary" onclick="updateItem('${item.id}', this)" style="flex: 1;"><i class="ph-bold ph-floppy-disk"></i> Save</button>
                    <button class="brutal-btn btn-danger" onclick="deleteItem('${item.id}', this)" style="padding: 0 20px;"><i class="ph-bold ph-trash"></i></button>
                </div>
            `;
        }

        // ==========================================
        // REALTIME HANDLERS
        // ==========================================
        function handleRealtimeInsert(newItem) {
            if(inventoryData.find(i => i.id === newItem.id)) return;
            inventoryData.unshift(newItem);

            if(!isInventoryLoaded) return; 

            const list = document.getElementById('inventory-list');
            const emptyState = list.querySelector('.empty-state');
            if(emptyState) emptyState.remove();

            const card = document.createElement('div');
            card.className = 'brutal-box inventory-card';
            card.id = `card-${newItem.id}`;
            card.innerHTML = createCardHTML(newItem);
            
            list.prepend(card);
            showToast("New product synced!", "sync");
        }

        function handleRealtimeUpdate(updatedItem) {
            const index = inventoryData.findIndex(i => i.id === updatedItem.id);
            if(index > -1) inventoryData[index] = updatedItem;

            if(!isInventoryLoaded) return;

            const fields = ['model', 'price', 'gender', 'size', 'color', 'style'];
            const dbFields = ['model_no', 'price', 'gender_category', 'sizes_available', 'color', 'style'];

            fields.forEach((f, i) => {
                const el = document.getElementById(`${f}-${updatedItem.id}`);
                if(el && document.activeElement !== el) {
                    el.value = updatedItem[dbFields[i]] || '';
                }
            });
        }

        function handleRealtimeDelete(oldItem) {
            inventoryData = inventoryData.filter(i => i.id !== oldItem.id);
            if(!isInventoryLoaded) return;

            const card = document.getElementById(`card-${oldItem.id}`);
            if(card) {
                card.style.transform = 'scale(0.9)';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.remove();
                    if(inventoryData.length === 0) {
                        document.getElementById('inventory-list').innerHTML = `<div class="empty-state brutal-box"><i class="ph-bold ph-package"></i><h2>Empty Inventory</h2><p>Go capture some items!</p></div>`;
                    }
                }, 300);
            }
        }

        // ==========================================
        // INVENTORY BASE LOGIC
        // ==========================================
        async function loadInventory() {
            toggleLoader(true, "Loading Data...");
            const list = document.getElementById('inventory-list');
            list.innerHTML = ''; 

            try {
                const { data, error } = await supabaseClient.from('inventory_items').select('*').order('created_at', { ascending: false });
                if (error) throw new Error("Failed to load: " + error.message);
                
                inventoryData = data;
                isInventoryLoaded = true;

                if(data.length === 0) {
                    list.innerHTML = `<div class="empty-state brutal-box"><i class="ph-bold ph-package"></i><h2>Empty Inventory</h2><p>Go capture some items!</p></div>`;
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'brutal-box inventory-card';
                    card.id = `card-${item.id}`; 
                    card.innerHTML = createCardHTML(item);
                    list.appendChild(card);
                });
            } catch (err) { alert(err.message); } finally { toggleLoader(false); }
        }

        function slideImg(id, dir) {
            const container = document.getElementById(`carousel-${id}`);
            const images = JSON.parse(container.getAttribute('data-images'));
            let idx = parseInt(container.getAttribute('data-idx'));
            idx = (idx + dir + images.length) % images.length; 
            container.setAttribute('data-idx', idx);
            document.getElementById(`img-${id}`).src = images[idx];
            document.getElementById(`badge-${id}`).innerText = `${idx + 1} / ${images.length}`;
        }

        async function updateItem(id, btn) {
            const original = btn.innerHTML; 
            btn.innerHTML = `<i class="ph-bold ph-spinner ph-spin"></i> Saving...`; 
            btn.style.pointerEvents = 'none';
            try {
                const payload = {
                    model_no: document.getElementById(`model-${id}`).value,
                    price: document.getElementById(`price-${id}`).value || null,
                    gender_category: document.getElementById(`gender-${id}`).value,
                    sizes_available: document.getElementById(`size-${id}`).value,
                    color: document.getElementById(`color-${id}`).value,
                    style: document.getElementById(`style-${id}`).value
                };

                const { error } = await supabaseClient.from('inventory_items').update(payload).eq('id', id);
                if (error) throw error;
                showToast("Item saved!");
            } catch (err) { alert("Failed to save: " + err.message); } 
            finally { btn.innerHTML = original; btn.style.pointerEvents = 'auto'; }
        }

        async function deleteItem(id, btn) {
            if (!confirm("Are you sure you want to completely DELETE this item and its images?")) return;
            btn.innerHTML = `<i class="ph-bold ph-spinner ph-spin"></i>`; 
            btn.style.pointerEvents = 'none';

            try {
                const item = inventoryData.find(i => i.id === id);
                let imagesToDel = item.images || [];
                if(imagesToDel.length === 0 && item.image_url) imagesToDel = [item.image_url];

                const { error } = await supabaseClient.from('inventory_items').delete().eq('id', id);
                if (error) throw error;

                if(imagesToDel.length > 0) {
                    const fileNames = imagesToDel.map(url => { const p = url.split('/'); return p[p.length - 1]; });
                    await supabaseClient.storage.from('images').remove(fileNames);
                }
                showToast("Item deleted", "danger");
            } catch (err) { alert("Failed to delete: " + err.message); btn.innerHTML = `<i class="ph-bold ph-trash"></i>`; btn.style.pointerEvents = 'auto'; }
        }

        // ==========================================
        // EXPORT CSV
        // ==========================================
        function exportCSV() {
            if (inventoryData.length === 0) return alert("No data available to export.");
            
            // Required headers matched exactly
            let csv = "Model No,Price,Gender category,Sizes Available,Color,Style,Image URLs (Pipe Separated)\n";
            
            inventoryData.forEach(r => {
                const model = `"${(r.model_no || '').replace(/"/g, '""')}"`;
                const price = `"${(r.price || '').toString().replace(/"/g, '""')}"`;
                const gender = `"${(r.gender_category || '').replace(/"/g, '""')}"`;
                const size = `"${(r.sizes_available || '').replace(/"/g, '""')}"`;
                const color = `"${(r.color || '').replace(/"/g, '""')}"`;
                const style = `"${(r.style || '').replace(/"/g, '""')}"`;
                
                let imgs = r.images || [];
                if(imgs.length === 0 && r.image_url) imgs = [r.image_url];
                const urls = `"${imgs.join(' | ')}"`; 
                
                csv += `${model},${price},${gender},${size},${color},${style},${urls}\n`;
            });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            link.download = `Inventory_Export_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showToast("CSV Downloaded!");
        }
    </script>
</body>
</html>
